<style>

    .card { padding:16px 16px 18px; }

<body>
<div id="app"></div>

<script>
/* ================= DATE INIȚIALE ================= */
const SEED_DATA = {
  rase: [],
  creaturi: [],
  obiecte: [],
  harta: [],
  talente: [],
  clase: [],
  npc: []
};

const TABS = [
  { key:"rase", label:"Rase", icon:"🧝", accent:"#3f6b6f" },
  { key:"creaturi", label:"Creaturi", icon:"🐉", accent:"#7a2331" },
  { key:"obiecte", label:"Obiecte", icon:"💎", accent:"#b8933f" },
  { key:"harta", label:"Hărți", icon:"🗺️", accent:"#6b4a2f" },
  { key:"talente", label:"Talente", icon:"✨", accent:"#6a3f7a" },

];

const FIELDS = {
  rase: [
    { key:"dimensiune", label:"Dimensiune", type:"select", options:["Mic","Mediu","Mare"] },
    { key:"viteza", label:"Viteză", type:"text", placeholder:"ex: 9 m" },

  ],
  creaturi: [

  ],
  obiecte: [
    { key:"tip", label:"Tip", type:"select", options:["Armă","Armură","Scut","Poțiune","Inel","Baghetă","Comoară","Altul"] },
    { key:"raritate", label:"Raritate", type:"select", options:["Comun","Neobișnuit","Rar","Foarte rar","Legendar"] },
    { key:"descriere", label:"Descriere", type:"textarea" },
    { key:"image", label:"Imagine (opțional)", type:"file" }
  ],
  harta: [
    { key:"descriere", label:"Descriere", type:"textarea" },
    { key:"image", label:"Imagine hartă", type:"file" }
  ],
  talente: [
    { key:"cerinte", label:"Cerințe", type:"text", placeholder:"ex: Forță 13+ sau „Fără cerințe”" },
    { key:"descriere", label:"Descriere", type:"textarea" },
    { key:"image", label:"Imagine (opțional)", type:"file" }
  ],
  clase: [
    { key:"caracteristica", label:"Caracteristică principală", type:"text", placeholder:"ex: Forță" },
    { key:"viataNivel", label:"Viață per nivel", type:"text", placeholder:"ex: 1d10" },
    { key:"abilitati", label:"Abilități cheie", type:"textarea" },
    { key:"descriere", label:"Descriere", type:"textarea" },
    { key:"image", label:"Imagine (opțional)", type:"file" }
  ],
  npc: [
    { key:"rol", label:"Rol / Ocupație", type:"text", placeholder:"ex: Hangiu, Căpitan de gardă, Vrăjitor" },
    { key:"rasa", label:"Rasă", type:"text", placeholder:"ex: Om, Elf, Pitic" },
    { key:"aliniament", label:"Aliniament", type:"select", options:["Legal Bun","Neutru Bun","Haotic Bun","Legal Neutru","Neutru","Haotic Neutru","Legal Rău","Neutru Rău","Haotic Rău"] },
    { key:"locatie", label:"Locație", type:"text", placeholder:"ex: Emarbiland, Portul de Sud" },
    { key:"descriere", label:"Descriere / Personalitate", type:"textarea" },
    { key:"image", label:"Imagine (opțional)", type:"file" }
  ]
};

const STORAGE_KEY = "dndCompendiumData_v1";

/* ================= AUTENTIFICARE (poartă simplă, nu securitate reală) =================
   4 parole fixe: Admin11 e DM-ul (vede tot, poate ascunde intrari de jucatori si
   poate previzualiza ce vad ei); Son, Hero, Freedrus sunt jucatori (nu vad intrarile
   marcate „doar pentru DM”).
*/
const USERS = {
  "Admin11": { name: "Admin", role: "dm" },
  "Son": { name: "Son", role: "player" },
  "Hero": { name: "Hero", role: "player" },
  "Freedrus": { name: "Freedrus", role: "player" }
};
const PLAYER_NAMES = ["Son", "Hero", "Freedrus"];
const AUTH_STORAGE_KEY = "dndCompendiumAuth_v1";

/* ================= SINCRONIZARE ONLINE (FIREBASE) =================
   IMPORTANT: completeaza aceste date cu cele din propriul tau proiect
   Firebase (gratuit), altfel sincronizarea NU va functiona.
   Vezi instructiunile trimise separat pentru cum obtii aceste valori.
*/
const firebaseConfig = {
  apiKey: "AIzaSyDNnQeDQN7BRbJEcwz9yNoMpzLNSzSUsyc",
  authDomain: "compendiul-dnd.firebaseapp.com",
  projectId: "compendiul-dnd",
  storageBucket: "compendiul-dnd.firebasestorage.app",
  messagingSenderId: "550230412786",
  appId: "1:550230412786:web:9b23b15622e2de04bcef6b"
};
let db = null;
let docRef = null;
let firebaseGata = false;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  docRef = db.collection("compendium").doc("shared");
  firebaseGata = true;
} catch (e) {
  console.warn("Firebase nu a putut fi initializat:", e);
}

/* ================= UPLOAD IMAGINI PE IMGBB =================
   Firestore are o limita de ~1MB per document, asa ca imaginile
   NU se mai salveaza direct in Firestore (ca Base64). In schimb,
   fiecare poza se urca pe ImgBB (serviciu gratuit de gazduire de
   imagini, fara nevoie de card), iar in Firestore se salveaza doar
   linkul (URL) catre poza.

   IMPORTANT: completeaza cheia ta gratuita de la https://api.imgbb.com/
   mai jos, intre ghilimele, altfel incarcarea pozelor nu va functiona.
*/
const IMGBB_API_KEY = "05d40645329192d5ca717a7f7a8cf4bc";

function uploadImageToStorage(file) {
  return new Promise((resolve, reject) => {
    if (!IMGBB_API_KEY || IMGBB_API_KEY.indexOf("PUNE_AICI") !== -1) {
      reject(new Error("Cheia ImgBB nu este configurată în cod."));
      return;
    }
    const fd = new FormData();
    fd.append("image", file);
    fetch(`https://api.imgbb.com/1/upload?key=${encodeURIComponent(IMGBB_API_KEY)}`, {
      method: "POST",
      body: fd
    })
      .then(res => res.json())
      .then(json => {
        if (json && json.success && json.data && json.data.url) {
          resolve(json.data.url);
        } else {
          reject(new Error((json && json.error && json.error.message) || "Răspuns neașteptat de la ImgBB."));
        }
      })
      .catch(reject);
  });
}

/* ================= STARE ȘI PERSISTENȚĂ ================= */
function getEffectiveViewer() {
  // Returneaza numele jucatorului "activ" pentru scopuri de vizibilitate,
  // sau null daca privim ca DM cu acces complet (nu in previzualizare).
  if (!state.currentUser) return null;
  if (state.currentUser.role === "player") return state.currentUser.name;
  if (state.currentUser.role === "dm" && state.previewAsUser) return state.previewAsUser;
  return null;
}
function getVisibilityLevel(item, viewerName) {
  // "full" = vede tot, "limited" = vede o versiune redusa, "hidden" = nu vede deloc.
  if (!viewerName) return "full"; // DM, fara previzualizare
  if (item.visibility && item.visibility[viewerName]) return item.visibility[viewerName];
  if (item.hiddenFromPlayers) return "hidden"; // compatibilitate cu versiunea veche (comutator simplu)
  return "full";
}
function checkStoredAuth() {
  try {
    const raw = localStorage.getItem(AUTH_STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved && USERS[saved.password] && USERS[saved.password].name === saved.name) {
        state.currentUser = { name: saved.name, role: saved.role, password: saved.password };
        return true;
      }
    }
  } catch (e) { /* ignoram, cerem login din nou */ }
  return false;
}
function attemptLogin(password) {
  const match = USERS[password];
  const errorEl = document.getElementById("login-error");
  if (!match) {
    if (errorEl) errorEl.textContent = "Parolă necunoscută. Verifică și încearcă din nou.";
    return;
  }
  state.currentUser = { name: match.name, role: match.role, password };
  try { localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify({ password, name: match.name, role: match.role })); }
  catch (e) { /* nicio problema, doar nu tine minte pt data viitoare */ }
  initApp();
}
function logout() {
  try { localStorage.removeItem(AUTH_STORAGE_KEY); } catch (e) {}
  state.currentUser = null;
  state.previewAsUser = null;
  renderLoginScreen();
}
function renderLoginScreen() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--ink);">
      <div style="background:var(--parchment);color:var(--text-ink);border-radius:12px;max-width:360px;width:100%;padding:32px 26px;text-align:center;border-top:6px solid var(--gold);box-shadow:0 20px 50px rgba(0,0,0,.5);">
        <h1 style="font-family:'Cinzel',serif;font-size:1.3rem;margin:0 0 6px;">📜 Compendiul Aventurii</h1>
        <p style="margin:0 0 18px;font-size:.85rem;opacity:.75;">Introdu parola ta personală pentru a intra.</p>
        <form id="login-form">

function loadDataLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn("Nu s-au putut citi datele locale:", e); }
  return JSON.parse(JSON.stringify(SEED_DATA));

function saveData() {

  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); }
  catch (e) { console.warn("Nu s-au putut salva datele local:", e); }

  if (firebaseGata && docRef) {
    docRef.set(state.data).catch(e => {
      console.warn("Nu s-au putut salva datele online:", e);
      alert("Nu s-a putut salva online — verifică conexiunea la internet. Modificarea a rămas doar local, pe acest telefon.");
    });
  }
}
function pornesteSincronizare() {
  if (!firebaseGata || !docRef) {
    // Firebase nu e configurat -> folosim doar datele locale, ca inainte.
    state.data = loadDataLocal();
    ensureAllCategories();
    render();
    return;
  }
  docRef.onSnapshot((doc) => {
    if (doc.exists) {
      state.data = doc.data();
    } else {
      // Prima oara cand se conecteaza cineva -> initializam documentul comun.
      const initiale = loadDataLocal();
      docRef.set(initiale);
      state.data = initiale;
    }
    ensureAllCategories();
    render();
  }, (error) => {
    console.error("Eroare sincronizare online:", error);
    // Daca nu merge sincronizarea (net picat, configurare gresita), folosim copia locala.
    state.data = loadDataLocal();
    ensureAllCategories();
    render();
    alert("Nu s-a putut conecta la sincronizarea online. Se folosesc datele salvate local pe acest telefon.");
  });
}

const TRANSLATE_CACHE = {};
function translateText(text, targetLang) {
  const clean = (text || "").toString().trim();
  if (!clean || !targetLang || targetLang === "ro") return Promise.resolve(clean);
  const cacheKey = targetLang + "::" + clean;
  if (TRANSLATE_CACHE[cacheKey] !== undefined) return Promise.resolve(TRANSLATE_CACHE[cacheKey]);
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(clean)}&langpair=ro|${targetLang}`;
  return fetch(url)
    .then(res => res.json())
    .then(data => {
      const translated = (data && data.responseData && data.responseData.translatedText) ? data.responseData.translatedText : clean;
      TRANSLATE_CACHE[cacheKey] = translated;
      return translated;
    })
    .catch(() => clean);
}

function escapeHtml(str) {
  return (str == null ? "" : String(str)).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function uid() { return "custom-" + Date.now() + "-" + Math.floor(Math.random()*1000); }

/* ================= ADĂUGARE ÎN MASĂ (BULK) =================
   Permite lipirea mai multor intrări deodată, separate prin o linie cu "---".
   Format pe fiecare intrare:
     Nume: ...
     Eticheta-câmp: valoare
     Descriere: text (poate continua pe mai multe rânduri)
   Prima linie, dacă nu are eticheta "Nume:", este folosită automat ca nume.
*/
function normalizeLabel(s) {
  return (s || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}
function buildBulkLabelMap(cat) {
  const map = {};
  map["nume"] = "name"; map["name"] = "name"; map["titlu"] = "name";
  (FIELDS[cat] || []).forEach(f => {
    if (f.type === "file") return;
    map[normalizeLabel(f.label)] = f.key;
    map[normalizeLabel(f.key)] = f.key;
  });
  return map;
}
function parseBulkText(text, cat) {
  const labelMap = buildBulkLabelMap(cat);
  const blocks = text.split(/\n\s*-{3,}\s*\n?/).map(b => b.trim()).filter(Boolean);
  const items = [];
  blocks.forEach(block => {
    const lines = block.split("\n");
    const data = {};
    let currentKey = null;
    lines.forEach((line, idx) => {
      const m = line.match(/^\s*([^:]{1,40}):\s*(.*)$/);
      if (m && labelMap[normalizeLabel(m[1])]) {
        currentKey = labelMap[normalizeLabel(m[1])];
        data[currentKey] = (m[2] || "").trim();
        return;
      }
      if (currentKey) {
        data[currentKey] = (data[currentKey] ? data[currentKey] + "\n" : "") + line;
      } else if (idx === 0 && line.trim()) {
        data.name = line.trim();
        currentKey = "name";
      }
    });
    if (data.name && data.name.trim()) {
      Object.keys(data).forEach(k => { if (typeof data[k] === "string") data[k] = data[k].trim(); });
      items.push(data);
    }
  });
  return items;
}

const CORS_PROXIES = [
  (u) => u,
  (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  (u) => `https://thingproxy.freeboard.io/fetch/${u}`
];

async function fetchExternalHtml(url) {
  let lastErr = null;
  for (const buildUrl of CORS_PROXIES) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 9000);
    try {
      const res = await fetch(buildUrl(url), { redirect: "follow", signal: controller.signal });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error("status " + res.status);
      const text = await res.text();
      if (text && text.length > 0) return text;
    } catch (e) { clearTimeout(timeoutId); lastErr = e; }
  }
  throw lastErr || new Error("Nu s-a putut prelua conținutul.");
}

function resolveUrlMaybe(maybeRelative, base) {
  if (!maybeRelative) return null;
  try { return new URL(maybeRelative, base).href; } catch (e) { return maybeRelative; }
}

function extractEntryFromHtml(html, sourceUrl) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const getMeta = (attr, val) => {
    const el = doc.querySelector(`meta[${attr}="${val}"]`);
    return el ? (el.getAttribute("content") || "").trim() : "";
  };
  const h1 = doc.querySelector("h1");
  const name = getMeta("property", "og:title") || getMeta("name", "twitter:title") || (h1 ? h1.textContent.trim() : "") || (doc.title || "").trim();

  let descriere = getMeta("property", "og:description") || getMeta("name", "description") || getMeta("name", "twitter:description");
  if (!descriere) {
    const paragraphs = Array.from(doc.querySelectorAll("p")).map(p => p.textContent.replace(/\s+/g, " ").trim()).filter(t => t.length > 60);
    descriere = paragraphs[0] || "";
  }
  descriere = descriere.replace(/\s+/g, " ").trim();

  let image = getMeta("property", "og:image") || getMeta("name", "twitter:image");
  if (!image) {
    const firstImg = doc.querySelector("article img, main img, img");
    if (firstImg) image = firstImg.getAttribute("src");
  }
  image = image ? resolveUrlMaybe(image, sourceUrl) : null;

  return { name, descriere, image };
}

function resetUrlImportState() {
  state.showUrlImport = false;
  state.urlImportUrl = "";
  state.urlImportLoading = false;
  state.urlImportError = null;
  state.urlImportData = null;
  state.pendingImage = {};
  state.uploadingImage = {};
}

function bindUrlImportEvents() {
  const closeEls = document.querySelectorAll('[data-action="close-url-import"]');
  closeEls.forEach(el => { el.onclick = () => { resetUrlImportState(); renderModal(); }; });

  const fetchBtn = document.querySelector('[data-action="url-import-fetch"]');
  const urlInput = document.getElementById("url-import-input");
  if (fetchBtn && urlInput) {
    fetchBtn.onclick = async () => {
      const raw = urlInput.value.trim();
      if (!raw) return;
      let normalized = raw;
      if (!/^https?:\/\//i.test(normalized)) normalized = "https://" + normalized;
      state.urlImportUrl = normalized;
      state.urlImportLoading = true;
      state.urlImportError = null;
      state.urlImportData = null;
      renderModal();
      try {
        const html = await fetchExternalHtml(normalized);
        const extracted = extractEntryFromHtml(html, normalized);
        if (!extracted.name && !extracted.descriere) {
          throw new Error("Nu am găsit conținut util pe această pagină.");
        }
        state.urlImportData = extracted;
        state.pendingImage = extracted.image ? { image: extracted.image } : {};
        state.uploadingImage = {};
      } catch (e) {
        state.urlImportError = "Nu am putut extrage automat conținutul de pe acest site (posibil blocat de site). Poți completa manual mai jos, sau încearcă alt link.";
        state.urlImportData = { name: "", descriere: "" };
        state.pendingImage = {};
        state.uploadingImage = {};
      } finally {
        state.urlImportLoading = false;
        renderModal();
      }
    };
  }

  const form = document.getElementById("url-import-form");
  if (!form) return;
  FIELDS[state.activeTab].forEach(f => {
    if (f.type !== "file") return;
    const input = document.getElementById(`urlimport-file-${f.key}`);
    if (!input) return;
    input.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const preview = document.getElementById(`urlimport-preview-${f.key}`);
      const status = document.getElementById(`urlimport-upload-status-${f.key}`);
      const localReader = new FileReader();
      localReader.onload = () => { if (preview) { preview.src = localReader.result; preview.style.display = "block"; } };
      localReader.readAsDataURL(file);

      state.uploadingImage[f.key] = true;
      delete state.pendingImage[f.key];
      if (status) status.textContent = "⏳ Se încarcă imaginea...";
      uploadImageToStorage(file).then(url => {
        state.pendingImage[f.key] = url;
        state.uploadingImage[f.key] = false;
        if (status) status.textContent = "✅ Imagine încărcată.";
      }).catch(err => {
        console.warn("Eroare upload imagine:", err);
        state.uploadingImage[f.key] = false;
        if (status) status.textContent = "⚠️ Încărcarea a eșuat. Încearcă din nou.";
        alert("Nu s-a putut încărca imaginea online. Verifică conexiunea la internet și încearcă din nou.");
      });
    };
  });
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const name = (fd.get("name") || "").toString().trim();
    const errorEl = document.getElementById("url-import-form-error");
    if (!name) { errorEl.innerHTML = `<div class="form-error">Introdu un nume înainte de a adăuga intrarea.</div>`; return; }
    if (Object.values(state.uploadingImage).some(Boolean)) {
      errorEl.innerHTML = `<div class="form-error">Așteaptă să se termine încărcarea imaginii înainte de a salva.</div>`;
      return;
    }
    const newItem = { id: uid(), custom: true, name, sourceUrl: state.urlImportUrl || null };
    FIELDS[state.activeTab].forEach(f => {
      if (f.type === "file") newItem[f.key] = state.pendingImage[f.key] || null;
      else newItem[f.key] = (fd.get(f.key) || "").toString();
    });
    state.data[state.activeTab].push(newItem);
    saveData();
    resetUrlImportState();
    render();
  };
}

        </select>
        <input type="file" id="import-file-input" accept="application/json" style="display:none" />
      </div>
    </header>
    ${state.previewAsUser ? `<div style="background:#7a2331;color:#fff;text-align:center;padding:8px 12px;font-family:'Cinzel',serif;font-size:.8rem;">👁 Previzualizezi site-ul ca <b>${escapeHtml(state.previewAsUser)}</b> — vezi exact ce ar vedea el.</div>` : ""}
    <div class="layout">
      <nav class="sidebar">
        ${TABS.map(t => `
          <button class="tab-btn${t.key===state.activeTab?' active':''}" style="border-left-color:${t.key===state.activeTab?t.accent:'transparent'}" data-action="switch-tab" data-tab="${t.key}">
            <span class="tab-icon">${t.icon}</span>${t.label}
            <span class="tab-count">${(() => { const viewer = getEffectiveViewer(); const arr = state.data[t.key]||[]; return viewer ? arr.filter(i=>getVisibilityLevel(i,viewer)!=="hidden").length : arr.length; })()}</span>
          </button>`).join("")}
      </nav>
      <main class="page" style="--accent:${tab.accent}">
        <div class="page-header">
          <h2>${tab.icon} ${tab.label}</h2>
          <div class="search-wrap">
            <span class="icon">🔍</span>
            <input id="search-input" placeholder="Caută în ${tab.label.toLowerCase()}..." value="${escapeHtml(state.query)}" />
          </div>
          <button class="add-btn" data-action="open-add">＋ Adaugă</button>
          <button class="add-btn" data-action="open-bulk-import" style="background:transparent;color:#3f6b6f;border-color:#3f6b6f;">📋 Adaugă în masă</button>
          <button class="add-btn" data-action="open-url-import" style="background:transparent;color:var(--wax);border-color:var(--wax);">🔗 Din URL</button>
        </div>
        <div id="grid-container">${buildGridHtml()}</div>
      </main>
    </div>
    <div id="modal-root"></div>
  `;
  renderModal();
  attachGlobalEvents();
  applyGridTranslations();
}

function bindModalEvents() {
  document.querySelectorAll('[data-action="close-modal"]').forEach(el => { el.onclick = () => { state.viewItemKey = null; renderModal(); }; });
  document.querySelectorAll('[data-action="close-form"]').forEach(el => { el.onclick = () => { state.showForm = false; state.editItemKey = null; state.pendingImage = {}; state.uploadingImage = {}; renderModal(); }; });
  document.querySelectorAll('[data-action="close-randomizer"]').forEach(el => {
    el.onclick = () => { state.showRandomizer = false; state.randomizerCat = null; state.randomizerItemId = null; renderModal(); };
  });
  document.querySelectorAll('[data-action="randomizer-select-cat"]').forEach(el => {
    el.onclick = () => {
      state.randomizerCat = el.getAttribute("data-cat");
      state.randomizerItemId = null;
      renderModal();
    };
  });
  document.querySelectorAll('[data-action="randomizer-roll"]').forEach(el => {
    el.onclick = () => {
      const viewer = getEffectiveViewer();
      const items = (state.data[state.randomizerCat] || []).filter(i => !viewer || getVisibilityLevel(i, viewer) !== "hidden");
      if (!items.length) return;
      const item = items[Math.floor(Math.random() * items.length)];
      state.randomizerItemId = item.id;
      renderModal();
    };
  });
  document.querySelectorAll('[data-action="delete-item"]').forEach(el => {
    el.onclick = () => {
      const cat = el.getAttribute("data-cat"), id = el.getAttribute("data-id");
      if (!confirm("Ștergi definitiv această intrare?")) return;
      state.data[cat] = state.data[cat].filter(i => i.id !== id);
      saveData();
      state.viewItemKey = null;
      render();
    };
  });
  document.querySelectorAll('[data-action="edit-item"]').forEach(el => {
    el.onclick = () => {
      const cat = el.getAttribute("data-cat"), id = el.getAttribute("data-id");
      state.activeTab = cat;
      state.editItemKey = { cat, id };
      state.viewItemKey = null;
      state.pendingImage = {};
      state.uploadingImage = {};
      state.showForm = true;
      renderModal();
    };
  });
  attachFormEvents();
}

function renderModal() {
  const root = document.getElementById("modal-root");
  if (!root) return;
  const tab = currentTab();

  if (state.viewItemKey) {
    const item = (state.data[state.viewItemKey.cat] || []).find(i => i.id === state.viewItemKey.id);
    const viewer = getEffectiveViewer();
    const level = item ? getVisibilityLevel(item, viewer) : "hidden";
    if (!item || level === "hidden") { state.viewItemKey = null; root.innerHTML = ""; return; }
    const isLimited = level === "limited";
    let media = "";
    if (state.viewItemKey.cat === "harta") {
      media = item.image ? `<img class="detail-img" src="${item.image}" alt="${escapeHtml(item.name)}"/>` : (item.implicita ? fantasyMapSvg("detail-img") : "");
    } else if (item.image && !isLimited) {
      media = `<img class="detail-img" src="${item.image}" alt="${escapeHtml(item.name)}"/>`;
    }
    let statRows = "";
    if (!isLimited) {
      if (state.viewItemKey.cat === "rase") statRows = `<div class="stat-row"><b>Trăsături speciale</b> <span id="modal-extra">${escapeHtml(item.trasaturi)}</span></div>`;
      if (state.viewItemKey.cat === "creaturi") statRows = `<div class="stat-row"><b>Puncte de viață</b> ${escapeHtml(item.viata)}</div><div class="stat-row"><b>Clasă armură</b> ${escapeHtml(item.armura)}</div>`;
      if (state.viewItemKey.cat === "clase") statRows = `<div class="stat-row"><b>Abilități cheie</b> <span id="modal-extra">${escapeHtml(item.abilitati)}</span></div>`;
      if (state.viewItemKey.cat === "npc") statRows = `<div class="stat-row"><b>Aliniament</b> ${escapeHtml(item.aliniament)||"—"}</div><div class="stat-row"><b>Locație</b> ${escapeHtml(item.locatie)||"—"}</div>`;
    }
    const badge = (state.viewItemKey.cat !== "harta" && !isLimited) ? `<span class="modal-badge">${getBadge(state.viewItemKey.cat, item)}</span>` : "";
    const displayDesc = isLimited ? (item.descriereLimitata || "Nu știi multe despre asta încă...") : item.descriere;
    const delBtn = item.custom ? `<button class="delete-btn" data-action="delete-item" data-cat="${state.viewItemKey.cat}" data-id="${item.id}">🗑 Șterge intrarea</button>` : "";
    const editBtn = `<button class="edit-btn" data-action="edit-item" data-cat="${state.viewItemKey.cat}" data-id="${item.id}">✏️ Editează</button>`;
    const lockNote = (state.currentUser && state.currentUser.role === "dm" && !state.previewAsUser && hasCustomVisibility(item))
      ? `<span class="modal-badge" style="background:#7a2331;">🔒 Are vizibilitate personalizată pe jucători</span>` : "";

    root.innerHTML = `<div class="modal-overlay" data-action="close-modal">
      <div class="modal" style="--accent:${tab.accent}" onclick="event.stopPropagation()">
        <button class="modal-close" data-action="close-modal">✕</button>
        ${media}
        <h2 id="modal-title">${escapeHtml(item.name)}</h2>
        ${badge}
        ${lockNote}
        ${statRows}
        <p class="desc" id="modal-desc">${escapeHtml(displayDesc)}</p>
        ${editBtn}
        ${delBtn}
      </div>
    </div>`;
    bindModalEvents();
    applyModalTranslations(item, state.viewItemKey.cat, displayDesc);
    return;
  }

  if (state.showUrlImport) {
    const data = state.urlImportData;
    const fields = FIELDS[state.activeTab];
    let bodyHtml;
    if (!data) {
      bodyHtml = `
        <div class="form-field">
          <label>Adresa paginii (URL)</label>
          <input type="text" id="url-import-input" placeholder="https://..." value="${escapeHtml(state.urlImportUrl)}" ${state.urlImportLoading ? "disabled" : ""}/>
        </div>
        ${state.urlImportError ? `<div class="form-error">${escapeHtml(state.urlImportError)}</div>` : ""}
        <button type="button" class="submit-btn" data-action="url-import-fetch" ${state.urlImportLoading ? "disabled" : ""}>${state.urlImportLoading ? "Se extrage..." : "⇩ Extrage conținutul"}</button>
        <div class="save-note">Funcționează doar dacă site-ul permite accesul din alte pagini. Dacă nu merge, poți completa manual după.</div>
      `;
    } else {
      const imgPreview = state.pendingImage.image
        ? `<img class="file-preview" id="urlimport-preview-image" src="${state.pendingImage.image}" style="display:block;"/>`
        : `<img class="file-preview" id="urlimport-preview-image" style="display:none;"/>`;
      bodyHtml = `
        <div id="url-import-form-error"></div>
        <form id="url-import-form">
          <div class="form-field">
            <label>Nume</label>
            <input type="text" name="name" placeholder="Numele intrării" value="${escapeHtml(data.name)}"/>
          </div>
          ${fields.map(f => {
            if (f.type === "select") {
              return `<div class="form-field"><label>${f.label}</label>
                <select name="${f.key}"><option value="">Alege...</option>${f.options.map(o=>`<option value="${o}">${o}</option>`).join("")}</select></div>`;
            }
            if (f.type === "text") {
              return `<div class="form-field"><label>${f.label}</label><input type="text" name="${f.key}" placeholder="${f.placeholder||''}"/></div>`;
            }
            if (f.type === "textarea") {
              const prefill = f.key === "descriere" ? escapeHtml(data.descriere) : "";
              return `<div class="form-field"><label>${f.label}</label><textarea name="${f.key}">${prefill}</textarea></div>`;
            }
            if (f.type === "file") {
              return `<div class="form-field"><label>${f.label}</label>
                <label class="file-drop">⭱ Alege o imagine de pe dispozitiv (sau păstreaz-o pe cea extrasă mai jos)<input type="file" accept="image/*" id="urlimport-file-${f.key}" data-field="${f.key}" style="display:none"/></label>
                <div class="save-note" id="urlimport-upload-status-${f.key}"></div>
                ${imgPreview}
              </div>`;
            }
            return "";
          }).join("")}
          <button type="submit" class="submit-btn">Adaugă în ${tab.label}</button>
          <div class="save-note">Verifică datele extrase înainte de a salva — extragerea automată nu e mereu perfectă.</div>
        </form>
      `;
    }
    root.innerHTML = `<div class="modal-overlay" data-action="close-url-import">
      <div class="modal" style="--accent:${tab.accent}" onclick="event.stopPropagation()">
        <button class="modal-close" data-action="close-url-import">✕</button>
        <h2>🔗 Importă din URL</h2>
        <span class="modal-badge">Se adaugă în ${tab.label}</span>
        ${bodyHtml}
      </div>
    </div>`;
    bindUrlImportEvents();
    return;
  }

  if (state.showBulkImport) {
    const cat = state.activeTab;
    const fields = FIELDS[cat].filter(f => f.type !== "file");
    const exampleLines = [`Nume: Alert`, `Cerinte: -`, `Descriere: Nu poți fi luat prin surprindere cât timp ești conștient.`];
    const preview = state.bulkText.trim() ? parseBulkText(state.bulkText, cat) : [];
    root.innerHTML = `<div class="modal-overlay" data-action="close-bulk-import">
      <div class="modal" style="--accent:${tab.accent};max-width:640px;" onclick="event.stopPropagation()">
        <button class="modal-close" data-action="close-bulk-import">✕</button>
        <h2>📋 Adaugă în masă</h2>
        <span class="modal-badge">Se adaugă în ${tab.label} — util pentru liste lungi, lipite dintr-o dată</span>
        <div class="form-field">
          <label>Format acceptat — fiecare intrare separată printr-o linie cu "---"</label>
          <div class="save-note" style="text-align:left;background:rgba(0,0,0,.05);padding:10px;border-radius:6px;line-height:1.5;">
            Câmpuri disponibile pentru „${tab.label}”: ${["Nume"].concat(fields.map(f=>f.label)).join(", ")}.<br/>
            Exemplu:<br/><code style="white-space:pre-wrap;">${exampleLines.join("\n")}
---
Nume: Actor
Cerinte: -
Descriere: Ai talent la teatru și imitații...</code>
          </div>
        </div>
        <div class="form-field">
          <label>Lipește lista aici</label>
          <textarea id="bulk-text-input" style="min-height:200px;font-family:'JetBrains Mono',monospace;font-size:.8rem;" placeholder="Nume: ...\nDescriere: ...\n---\nNume: ...">${escapeHtml(state.bulkText)}</textarea>
        </div>
        ${state.bulkError ? `<div class="form-error">${escapeHtml(state.bulkError)}</div>` : ""}
        <div class="save-note" id="bulk-preview-count">${state.bulkText.trim() ? `${preview.length} intrări recunoscute din text.` : "Lipește textul ca să vezi câte intrări sunt recunoscute."}</div>
        <button type="button" class="submit-btn" data-action="bulk-import-confirm">✅ Adaugă intrările recunoscute</button>
      </div>
    </div>`;
    bindBulkImportEvents();
    return;
  }

  if (state.showForm) {
    const fields = FIELDS[state.activeTab];
    const editing = !!state.editItemKey;
    const editItem = editing ? (state.data[state.editItemKey.cat] || []).find(i => i.id === state.editItemKey.id) : null;
    if (editing && !editItem) { state.editItemKey = null; state.showForm = false; root.innerHTML = ""; return; }
    root.innerHTML = `<div class="modal-overlay" data-action="close-form">
      <div class="modal" style="--accent:${tab.accent}" onclick="event.stopPropagation()">
        <button class="modal-close" data-action="close-form">✕</button>
        <h2>${editing ? "Editează intrarea" : `Adaugă în ${tab.label}`}</h2>
        <span class="modal-badge">${editing ? "Modifică detaliile de mai jos" : "Completează detaliile de mai jos"}</span>
        <div id="form-error"></div>
        <form id="entry-form">
          <div class="form-field">
            <label>Nume</label>
            <input type="text" name="name" placeholder="Numele intrării" value="${editing ? escapeHtml(editItem.name) : ""}"/>
          </div>
          ${fields.map(f => {
            if (f.type === "select") {
              const cur = editing ? (editItem[f.key] || "") : "";
              return `<div class="form-field"><label>${f.label}</label>
                <select name="${f.key}"><option value="">Alege...</option>${f.options.map(o=>`<option value="${o}" ${o===cur?"selected":""}>${o}</option>`).join("")}</select></div>`;
            }
            if (f.type === "text") {
              const cur = editing ? escapeHtml(editItem[f.key] || "") : "";
              return `<div class="form-field"><label>${f.label}</label><input type="text" name="${f.key}" placeholder="${f.placeholder||''}" value="${cur}"/></div>`;
            }
            if (f.type === "textarea") {
              const cur = editing ? escapeHtml(editItem[f.key] || "") : "";
              return `<div class="form-field"><label>${f.label}</label><textarea name="${f.key}">${cur}</textarea></div>`;
            }
            if (f.type === "file") {
              const curImg = editing ? (state.pendingImage[f.key] !== undefined ? state.pendingImage[f.key] : editItem[f.key]) : state.pendingImage[f.key];
              const showPreview = !!curImg;
              return `<div class="form-field"><label>${f.label}</label>
                <label class="file-drop">⭱ Alege o imagine de pe dispozitiv${editing ? " (sau păstreaz-o pe cea curentă)" : ""}<input type="file" accept="image/*" id="file-${f.key}" data-field="${f.key}" style="display:none"/></label>
                <div class="save-note" id="upload-status-${f.key}"></div>
                <img class="file-preview" id="preview-${f.key}" src="${showPreview ? curImg : ""}" style="${showPreview ? "display:block;" : ""}"/>
              </div>`;
            }
            return "";
          }).join("")}
          ${state.currentUser && state.currentUser.role === "dm" ? `
          <div class="form-field" style="background:rgba(122,35,49,0.07);padding:12px;border-radius:6px;">
            <label style="margin-bottom:8px;display:block;">🔒 Vizibilitate per jucător</label>
            ${PLAYER_NAMES.map(p => {
              const cur = editing ? getVisibilityLevel(editItem, p) : "full";
              return `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
                <span style="font-size:.85rem;">${p}</span>
                <select data-visibility-for="${p}" style="width:auto;flex:1;max-width:170px;">
                  <option value="full" ${cur==="full"?"selected":""}>✅ Vede tot</option>
                  <option value="limited" ${cur==="limited"?"selected":""}>👁 Vede parțial</option>
                  <option value="hidden" ${cur==="hidden"?"selected":""}>🚫 Nu vede deloc</option>
                </select>
              </div>`;
            }).join("")}
          </div>
          <div class="form-field">
            <label>Descriere parțială (opțional — ce vede cel cu „acces parțial”)</label>
            <textarea id="descriere-limitata-input" placeholder="ex: Ai auzit doar zvonuri vagi despre asta...">${editing ? escapeHtml(editItem.descriereLimitata || "") : ""}</textarea>
          </div>` : ""}
          <button type="submit" class="submit-btn">${editing ? "Salvează modificările" : "Salvează intrarea"}</button>
          <div class="save-note">Se salvează automat, definitiv, pentru toți cei care folosesc situl.</div>
        </form>
      </div>
    </div>`;
    bindModalEvents();
    return;
  }

  if (state.showRandomizer) {
    const cat = state.randomizerCat;
    const catInfo = cat ? TABS.find(t => t.key === cat) : null;
    const items = cat ? (() => { const viewer = getEffectiveViewer(); const arr = state.data[cat]||[]; return viewer ? arr.filter(i=>getVisibilityLevel(i,viewer)!=="hidden") : arr; })() : [];
    const pickedItem = state.randomizerItemId ? items.find(i => i.id === state.randomizerItemId) : null;

    const catsHtml = TABS.map(t => `
      <button class="randomizer-cat-btn${t.key===cat?' active':''}" data-action="randomizer-select-cat" data-cat="${t.key}">
        <span>${t.icon}</span>${t.label}
      </button>`).join("");

    let resultHtml = "";
    if (cat && !items.length) {
      resultHtml = `<div class="randomizer-empty">Nu ai încă nicio intrare la „${catInfo.label}”. Adaugă mai întâi câteva din filă înainte de a le randomiza.</div>`;
    } else if (cat && pickedItem) {
      const pickedLevel = getVisibilityLevel(pickedItem, getEffectiveViewer());
      const pickedIsLimited = pickedLevel === "limited";
      const badge = pickedIsLimited ? "" : getBadge(cat, pickedItem);
      const pickedDesc = pickedIsLimited ? (pickedItem.descriereLimitata || "Nu știi multe despre asta încă...") : pickedItem.descriere;
      resultHtml = `<div class="randomizer-result">
        <span class="modal-badge">${escapeHtml(catInfo.label)}${badge ? " · " + badge : ""}</span>
        <h3>${escapeHtml(pickedItem.name)}</h3>
        <p class="desc">${escapeHtml(pickedDesc)}</p>
      </div>`;
    }

    root.innerHTML = `<div class="modal-overlay" data-action="close-randomizer">
      <div class="modal" style="--accent:${tab.accent}" onclick="event.stopPropagation()">
        <button class="modal-close" data-action="close-randomizer">✕</button>
        <h2>🎲 Randomizer</h2>
        <span class="modal-badge">Alege o categorie, apoi rostogolește</span>
        <div class="randomizer-cats">${catsHtml}</div>
        ${cat ? `<button class="roll-btn" data-action="randomizer-roll">🎲 ${pickedItem ? "Rostogolește din nou" : "Rostogolește"}</button>` : ""}
        ${resultHtml}
      </div>
    </div>`;
    bindModalEvents();
    return;
  }

  root.innerHTML = "";
}

/* ================= EVENIMENTE ================= */
function attachGridEvents() {
  document.querySelectorAll('[data-action="view-item"]').forEach(el => {
    el.onclick = () => { state.viewItemKey = { cat: state.activeTab, id: el.getAttribute("data-id") }; state.showRandomizer = false; renderModal(); };
  });
}

function attachGlobalEvents() {
  const logoutBtn = document.querySelector('[data-action="logout"]');
  if (logoutBtn) logoutBtn.onclick = () => { if (confirm("Ieși din cont pe acest telefon?")) logout(); };
  const previewSelect = document.getElementById("preview-select");
  if (previewSelect) previewSelect.onchange = (e) => { state.previewAsUser = e.target.value || null; state.viewItemKey = null; render(); };
  document.querySelectorAll('[data-action="switch-tab"]').forEach(el => {
    el.onclick = () => { state.activeTab = el.getAttribute("data-tab"); state.query = ""; state.viewItemKey = null; state.showForm = false; render(); };
  });
  const addBtn = document.querySelector('[data-action="open-add"]');
  if (addBtn) addBtn.onclick = () => { state.pendingImage = {}; state.uploadingImage = {}; state.editItemKey = null; state.showForm = true; state.showRandomizer = false; renderModal(); };
  const urlImportBtn = document.querySelector('[data-action="open-url-import"]');
  if (urlImportBtn) urlImportBtn.onclick = () => {
    resetUrlImportState();
    state.showUrlImport = true;
    state.showForm = false;
    state.showRandomizer = false;
    renderModal();
  };
  const bulkImportBtn = document.querySelector('[data-action="open-bulk-import"]');
  if (bulkImportBtn) bulkImportBtn.onclick = () => {
    state.showBulkImport = true;
    state.bulkText = "";
    state.bulkError = null;
    state.showForm = false;
    state.showUrlImport = false;
    state.showRandomizer = false;
    renderModal();
  };

  const searchInput = document.getElementById("search-input");
  if (searchInput) searchInput.oninput = (e) => { state.query = e.target.value; renderGrid(); };

  const exportBtn = document.querySelector('[data-action="export-data"]');
  if (exportBtn) exportBtn.onclick = exportData;
  const importTrigger = document.querySelector('[data-action="trigger-import"]');
  const importInput = document.getElementById("import-file-input");
  if (importTrigger && importInput) {
    importTrigger.onclick = () => importInput.click();
    importInput.onchange = handleImportFile;
  }
  const copyHtmlBtn = document.querySelector('[data-action="copy-html"]');
  if (copyHtmlBtn) copyHtmlBtn.onclick = copyPageHtml;
  const randomizerBtn = document.querySelector('[data-action="open-randomizer"]');
  if (randomizerBtn) randomizerBtn.onclick = () => {
    state.viewItemKey = null;
    state.showForm = false;
    state.showRandomizer = true;
    renderModal();
  };
  const langSelect = document.getElementById("lang-select");
  if (langSelect) langSelect.onchange = (e) => {
    state.language = e.target.value;
    renderGrid();
    if (state.viewItemKey) renderModal();
  };

  attachGridEvents();
}

function attachFormEvents() {
  const form = document.getElementById("entry-form");
  if (!form) return;
  FIELDS[state.activeTab].forEach(f => {
    if (f.type !== "file") return;
    const input = document.getElementById(`file-${f.key}`);
    if (!input) return;
    input.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const preview = document.getElementById(`preview-${f.key}`);
      const status = document.getElementById(`upload-status-${f.key}`);
      // Previzualizare locală instantanee (nu se salvează, doar afișare).
      const localReader = new FileReader();
      localReader.onload = () => { if (preview) { preview.src = localReader.result; preview.style.display = "block"; } };
      localReader.readAsDataURL(file);

      state.uploadingImage[f.key] = true;
      delete state.pendingImage[f.key];
      if (status) status.textContent = "⏳ Se încarcă imaginea...";
      uploadImageToStorage(file).then(url => {
        state.pendingImage[f.key] = url;
        state.uploadingImage[f.key] = false;
        if (status) status.textContent = "✅ Imagine încărcată.";
      }).catch(err => {
        console.warn("Eroare upload imagine:", err);
        state.uploadingImage[f.key] = false;
        if (status) status.textContent = "⚠️ Încărcarea a eșuat. Încearcă din nou.";
        alert("Nu s-a putut încărca imaginea online. Verifică conexiunea la internet și încearcă din nou.");
      });
    };
  });
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const name = (fd.get("name") || "").toString().trim();
    const errorEl = document.getElementById("form-error");
    if (!name) { errorEl.innerHTML = `<div class="form-error">Introdu un nume înainte de a adăuga intrarea.</div>`; return; }
    if (Object.values(state.uploadingImage).some(Boolean)) {
      errorEl.innerHTML = `<div class="form-error">Așteaptă să se termine încărcarea imaginii înainte de a salva.</div>`;
      return;
    }
    const editing = !!state.editItemKey;
    const isDm = state.currentUser && state.currentUser.role === "dm";
    let visibility = null, descriereLimitata = "";
    if (isDm) {
      visibility = {};
      PLAYER_NAMES.forEach(p => {
        const sel = document.querySelector(`[data-visibility-for="${p}"]`);
        visibility[p] = sel ? sel.value : "full";
      });
      const limitedInput = document.getElementById("descriere-limitata-input");
      descriereLimitata = limitedInput ? limitedInput.value.trim() : "";
    }
    if (editing) {
      const list = state.data[state.editItemKey.cat] || [];
      const existing = list.find(i => i.id === state.editItemKey.id);
      if (!existing) { state.showForm = false; state.editItemKey = null; render(); return; }
      existing.name = name;
      FIELDS[state.activeTab].forEach(f => {
        if (f.type === "file") {
          // Pastreaza imaginea existenta daca nu s-a incarcat una noua.
          if (state.pendingImage[f.key] !== undefined) existing[f.key] = state.pendingImage[f.key];
        } else {
          existing[f.key] = (fd.get(f.key) || "").toString();
        }
      });
      if (isDm) { existing.visibility = visibility; existing.descriereLimitata = descriereLimitata; delete existing.hiddenFromPlayers; }
      saveData();
      state.showForm = false;
      state.editItemKey = null;
      state.pendingImage = {};
      state.viewItemKey = { cat: state.activeTab, id: existing.id };
      render();
      return;
    }
    const newItem = { id: uid(), custom: true, name };
    if (isDm) { newItem.visibility = visibility; newItem.descriereLimitata = descriereLimitata; }
    FIELDS[state.activeTab].forEach(f => {
      if (f.type === "file") newItem[f.key] = state.pendingImage[f.key] || null;
      else newItem[f.key] = (fd.get(f.key) || "").toString();
    });
    state.data[state.activeTab].push(newItem);
    saveData();
    state.showForm = false;
    state.pendingImage = {};
    render();
  };
}

function bindBulkImportEvents() {
  const textInput = document.getElementById("bulk-text-input");
  const previewEl = document.getElementById("bulk-preview-count");
  if (textInput) {
    textInput.oninput = (e) => {
      state.bulkText = e.target.value;
      state.bulkError = null;
      if (previewEl) {
        const preview = state.bulkText.trim() ? parseBulkText(state.bulkText, state.activeTab) : [];
        previewEl.textContent = state.bulkText.trim() ? `${preview.length} intrări recunoscute din text.` : "Lipește textul ca să vezi câte intrări sunt recunoscute.";
      }
    };
  }
  document.querySelectorAll('[data-action="close-bulk-import"]').forEach(el => {
    el.onclick = () => { state.showBulkImport = false; state.bulkText = ""; state.bulkError = null; renderModal(); };
  });
  const confirmBtn = document.querySelector('[data-action="bulk-import-confirm"]');
  if (confirmBtn) {
    confirmBtn.onclick = () => {
      const cat = state.activeTab;
      const items = parseBulkText(state.bulkText, cat);
      if (!items.length) {
        state.bulkError = "Nu am recunoscut nicio intrare validă în text. Verifică formatul (fiecare intrare are nevoie de un nume).";
        renderModal();
        return;
      }
      items.forEach(data => {
        const newItem = { id: uid(), custom: true, name: data.name };
        FIELDS[cat].forEach(f => {
          if (f.type === "file") { newItem[f.key] = null; return; }
          newItem[f.key] = data[f.key] || "";
        });
        state.data[cat].push(newItem);
      });
      saveData();
      state.showBulkImport = false;
      state.bulkText = "";
      state.bulkError = null;
      render();
    };
  }
}

/* ================= BACKUP MANUAL (opțional) ================= */
function exportData() {
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "compendiul-dnd-backup.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function handleImportFile(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const valid = typeof parsed === "object" && parsed !== null && Object.keys(parsed).some(k => Array.isArray(parsed[k]));
      if (!valid) throw new Error("format necunoscut");
      if (!confirm("Importul va înlocui datele curente din aplicație cu cele din fișier. Continui?")) return;
      state.data = parsed;
      ensureAllCategories();
      saveData();
      render();
      alert("Backup importat cu succes.");
    } catch (err) {
      alert("Fișierul nu pare a fi un backup valid al acestei aplicații.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

function copyPageHtml() {
  const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  const btn = document.querySelector('[data-action="copy-html"]');
  const showDone = () => {
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = "✓ Copiat!";
    setTimeout(() => { btn.textContent = original; }, 1800);
  };
  const showFail = () => alert("Nu s-a putut copia automat. Selectează și copiază manual codul.");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(html).then(showDone).catch(() => fallbackCopy(html, showDone, showFail));
  } else {
    fallbackCopy(html, showDone, showFail);
  }
}
function fallbackCopy(text, onSuccess, onFail) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand("copy");
    if (onSuccess) onSuccess();
  } catch (e) {
    if (onFail) onFail();
  }
  document.body.removeChild(ta);
}

/* ================= PORNIRE ================= */
initApp();
