<script>
/* ================= DATE INIȚIALE ================= */

const TABS = [

    { key:"tip", label:"Tip", type:"select", options:["Umanoid","Fiară","Nemort","Dragon","Aberație","Elemental","Celest","Diavol","Gigant","Construct"] },
    { key:"amenintare", label:"Nivel de amenințare (CR)", type:"text", placeholder:"ex: 1/2, 5, 12" },

const STORAGE_KEY = "dndCompendiumData_v1";

/* ================= SINCRONIZARE ONLINE (FIREBASE) =================
   IMPORTANT: completeaza aceste date cu cele din propriul tau proiect
   Firebase (gratuit), altfel sincronizarea NU va functiona.
   Vezi instructiunile trimise separat pentru cum obtii aceste valori.
*/
const firebaseConfig = {
  apiKey: "AIzaSyDNnQeDQN7BRbJEcwz9yNoMpzLNSzSUsyc",
  authDomain: "compendiul-dnd.firebaseapp.com",
  projectId: "compendiul-dnd",
  storageBucket: "compendiul-dnd.firebasestorage.app",
  messagingSenderId: "550230412786",
  appId: "1:550230412786:web:9b23b15622e2de04bcef6b"
};
let db = null;
let docRef = null;
let firebaseGata = false;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  docRef = db.collection("compendium").doc("shared");
  firebaseGata = true;
} catch (e) {
  console.warn("Firebase nu a putut fi initializat:", e);
}

/* ================= STARE ȘI PERSISTENȚĂ ================= */
function loadDataLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn("Nu s-au putut citi datele locale:", e); }
  return JSON.parse(JSON.stringify(SEED_DATA));
}
function saveData() {
  // Salvam mereu si o copie locala, ca rezerva (in caz ca nu exista net).
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); }
  catch (e) { console.warn("Nu s-au putut salva datele local:", e); }

  if (firebaseGata && docRef) {
    docRef.set(state.data).catch(e => {
      console.warn("Nu s-au putut salva datele online:", e);
      alert("Nu s-a putut salva online — verifică conexiunea la internet. Modificarea a rămas doar local, pe acest telefon.");
    });
  }
}
function pornesteSincronizare() {
  if (!firebaseGata || !docRef) {
    // Firebase nu e configurat -> folosim doar datele locale, ca inainte.
    state.data = loadDataLocal();
    render();
    return;
  }
  docRef.onSnapshot((doc) => {
    if (doc.exists) {
      state.data = doc.data();
    } else {
      // Prima oara cand se conecteaza cineva -> initializam documentul comun.
      const initiale = loadDataLocal();
      docRef.set(initiale);
      state.data = initiale;
    }
    render();
  }, (error) => {
    console.error("Eroare sincronizare online:", error);
    // Daca nu merge sincronizarea (net picat, configurare gresita), folosim copia locala.
    state.data = loadDataLocal();
    render();
    alert("Nu s-a putut conecta la sincronizarea online. Se folosesc datele salvate local pe acest telefon.");
  });
}

let state = {
  data: JSON.parse(JSON.stringify(SEED_DATA)),
  activeTab: "rase",
  query: "",
  viewItemKey: null,   // {cat, id}
  showForm: false,
  showRandomizer: false,
  randomizerCat: null,

  pendingImage: {},      // câmpuri de tip fișier din formularul curent
  showUrlImport: false,

  urlImportLoading: false,
  urlImportError: null,

};

const LANGUAGES = [
  { code:"ro", label:"Română (original)" },
  { code:"en", label:"Engleză" },
  { code:"fr", label:"Franceză" },
  { code:"de", label:"Germană" },
  { code:"es", label:"Spaniolă" },
  { code:"it", label:"Italiană" },
  { code:"pt", label:"Portugheză" },
  { code:"ru", label:"Rusă" },
  { code:"hu", label:"Maghiară" },
  { code:"pl", label:"Poloneză" },
  { code:"tr", label:"Turcă" },
  { code:"ja", label:"Japoneză" },
  { code:"zh", label:"Chineză" }
];

const TRANSLATE_CACHE = {};
function translateText(text, targetLang) {
  const clean = (text || "").toString().trim();
  if (!clean || !targetLang || targetLang === "ro") return Promise.resolve(clean);
  const cacheKey = targetLang + "::" + clean;
  if (TRANSLATE_CACHE[cacheKey] !== undefined) return Promise.resolve(TRANSLATE_CACHE[cacheKey]);
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(clean)}&langpair=ro|${targetLang}`;
  return fetch(url)
    .then(res => res.json())
    .then(data => {
      const translated = (data && data.responseData && data.responseData.translatedText) ? data.responseData.translatedText : clean;
      TRANSLATE_CACHE[cacheKey] = translated;
      return translated;
    })
    .catch(() => clean);
}

function applyGridTranslations() {
  if (state.language === "ro") return;
  filteredItems().forEach(item => {
    const card = document.querySelector(`.grid [data-id="${item.id}"]`);
    if (!card) return;
    const nameEl = card.querySelector(".card-name");
    const descEl = card.querySelector(".card-desc");
    const lang = state.language;
    if (nameEl) translateText(item.name, lang).then(t => { if (state.language === lang && document.body.contains(nameEl)) nameEl.textContent = t; });
    if (descEl) translateText(item.descriere, lang).then(t => { if (state.language === lang && document.body.contains(descEl)) descEl.textContent = t; });
  });
}

function applyModalTranslations(item, cat) {
  if (state.language === "ro") return;
  const lang = state.language;
  const titleEl = document.getElementById("modal-title");
  const descEl = document.getElementById("modal-desc");
  const extraEl = document.getElementById("modal-extra");
  if (titleEl) translateText(item.name, lang).then(t => { if (state.language === lang && document.body.contains(titleEl)) titleEl.textContent = t; });
  if (descEl) translateText(item.descriere, lang).then(t => { if (state.language === lang && document.body.contains(descEl)) descEl.textContent = t; });
  if (extraEl) {
    const extraText = cat === "rase" ? item.trasaturi : cat === "clase" ? item.abilitati : "";
    if (extraText) translateText(extraText, lang).then(t => { if (state.language === lang && document.body.contains(extraEl)) extraEl.textContent = t; });
  }
}

function escapeHtml(str) {
  return (str == null ? "" : String(str)).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function uid() { return "custom-" + Date.now() + "-" + Math.floor(Math.random()*1000); }

function getBadge(cat, item) {
  switch (cat) {
    case "rase": return `${escapeHtml(item.dimensiune)||"—"} · ${escapeHtml(item.viteza)||"—"}`;
    case "creaturi": return `${escapeHtml(item.tip)||"—"} · AP ${escapeHtml(item.amenintare)||"—"}`;
    case "obiecte": return `${escapeHtml(item.tip)||"—"} · ${escapeHtml(item.raritate)||"—"}`;
    case "harta": return "Hartă";
    case "talente": return escapeHtml(item.cerinte) || "Fără cerințe";
    case "clase": return `${escapeHtml(item.caracteristica)||"—"} · Viață ${escapeHtml(item.viataNivel)||"—"}`;
    default: return "";
  }
}

/* ================= IMPORT DE PE URL EXTERN ================= */
const CORS_PROXIES = [
  (u) => u,
  (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`
];

async function fetchExternalHtml(url) {
  let lastErr = null;
  for (const buildUrl of CORS_PROXIES) {
    try {
      const res = await fetch(buildUrl(url), { redirect: "follow" });
      if (!res.ok) throw new Error("status " + res.status);
      const text = await res.text();
      if (text && text.length > 0) return text;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("Nu s-a putut prelua conținutul.");
}

function resolveUrlMaybe(maybeRelative, base) {
  if (!maybeRelative) return null;
  try { return new URL(maybeRelative, base).href; } catch (e) { return maybeRelative; }
}

function extractEntryFromHtml(html, sourceUrl) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const getMeta = (attr, val) => {
    const el = doc.querySelector(`meta[${attr}="${val}"]`);
    return el ? (el.getAttribute("content") || "").trim() : "";
  };
  const h1 = doc.querySelector("h1");
  const name = getMeta("property", "og:title") || getMeta("name", "twitter:title") || (h1 ? h1.textContent.trim() : "") || (doc.title || "").trim();

  let descriere = getMeta("property", "og:description") || getMeta("name", "description") || getMeta("name", "twitter:description");
  if (!descriere) {
    const paragraphs = Array.from(doc.querySelectorAll("p")).map(p => p.textContent.replace(/\s+/g, " ").trim()).filter(t => t.length > 60);
    descriere = paragraphs[0] || "";
  }
  descriere = descriere.replace(/\s+/g, " ").trim();

  let image = getMeta("property", "og:image") || getMeta("name", "twitter:image");
  if (!image) {
    const firstImg = doc.querySelector("article img, main img, img");
    if (firstImg) image = firstImg.getAttribute("src");
  }
  image = image ? resolveUrlMaybe(image, sourceUrl) : null;

  return { name, descriere, image };
}

function resetUrlImportState() {
  state.showUrlImport = false;
  state.urlImportUrl = "";
  state.urlImportLoading = false;
  state.urlImportError = null;
  state.urlImportData = null;
  state.pendingImage = {};
}

function bindUrlImportEvents() {
  const closeEls = document.querySelectorAll('[data-action="close-url-import"]');
  closeEls.forEach(el => { el.onclick = () => { resetUrlImportState(); renderModal(); }; });

  const fetchBtn = document.querySelector('[data-action="url-import-fetch"]');
  const urlInput = document.getElementById("url-import-input");
  if (fetchBtn && urlInput) {
    fetchBtn.onclick = async () => {
      const raw = urlInput.value.trim();
      if (!raw) return;
      let normalized = raw;
      if (!/^https?:\/\//i.test(normalized)) normalized = "https://" + normalized;
      state.urlImportUrl = normalized;
      state.urlImportLoading = true;
      state.urlImportError = null;
      state.urlImportData = null;
      renderModal();
      try {
        const html = await fetchExternalHtml(normalized);
        const extracted = extractEntryFromHtml(html, normalized);
        if (!extracted.name && !extracted.descriere) {
          throw new Error("Nu am găsit conținut util pe această pagină.");
        }
        state.urlImportData = extracted;
        state.pendingImage = extracted.image ? { image: extracted.image } : {};
      } catch (e) {
        state.urlImportError = "Nu am putut extrage automat conținutul de pe acest site (posibil blocat de site). Poți completa manual mai jos, sau încearcă alt link.";
        state.urlImportData = { name: "", descriere: "" };
        state.pendingImage = {};
      } finally {
        state.urlImportLoading = false;
        renderModal();
      }
    };
  }

  const form = document.getElementById("url-import-form");
  if (!form) return;
  FIELDS[state.activeTab].forEach(f => {
    if (f.type !== "file") return;
    const input = document.getElementById(`urlimport-file-${f.key}`);
    if (!input) return;
    input.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.pendingImage[f.key] = reader.result;
        const preview = document.getElementById(`urlimport-preview-${f.key}`);
        if (preview) { preview.src = reader.result; preview.style.display = "block"; }
      };
      reader.readAsDataURL(file);
    };
  });
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const name = (fd.get("name") || "").toString().trim();
    const errorEl = document.getElementById("url-import-form-error");
    if (!name) { errorEl.innerHTML = `<div class="form-error">Introdu un nume înainte de a adăuga intrarea.</div>`; return; }
    const newItem = { id: uid(), custom: true, name, sourceUrl: state.urlImportUrl || null };
    FIELDS[state.activeTab].forEach(f => {
      if (f.type === "file") newItem[f.key] = state.pendingImage[f.key] || null;
      else newItem[f.key] = (fd.get(f.key) || "").toString();
    });
    state.data[state.activeTab].push(newItem);
    saveData();
    resetUrlImportState();
    render();
  };
}

    el.onclick = () => { state.showRandomizer = false; state.randomizerCat = null; state.randomizerItemId = null; renderModal(); };

  document.querySelectorAll('[data-action="randomizer-select-cat"]').forEach(el => {
    el.onclick = () => {

      state.randomizerItemId = null;
      renderModal();
    };
  });
  document.querySelectorAll('[data-action="randomizer-roll"]').forEach(el => {
    el.onclick = () => {
      const items = state.data[state.randomizerCat] || [];
      if (!items.length) return;

      state.randomizerItemId = item.id;

    const delBtn = item.custom ? `<button class="delete-btn" data-action="delete-item" data-cat="${state.viewItemKey.cat}" data-id="${item.id}">🗑 Șterge intrarea</button>` : "";

        : `<img class="file-preview" id="urlimport-preview-image" style="display:none;"/>`;
      bodyHtml = `
        <div id="url-import-form-error"></div>
        <form id="url-import-form">
          <div class="form-field">
            <label>Nume</label>
            <input type="text" name="name" placeholder="Numele intrării" value="${escapeHtml(data.name)}"/>
          </div>

            if (f.type === "select") {

/* ================= EVENIMENTE ================= */
function attachGridEvents() {
  document.querySelectorAll('[data-action="view-item"]').forEach(el => {
    el.onclick = () => { state.viewItemKey = { cat: state.activeTab, id: el.getAttribute("data-id") }; state.showRandomizer = false; renderModal(); };

}

function attachGlobalEvents() {
  document.querySelectorAll('[data-action="switch-tab"]').forEach(el => {
    el.onclick = () => { state.activeTab = el.getAttribute("data-tab"); state.query = ""; state.viewItemKey = null; state.showForm = false; render(); };

  if (urlImportBtn) urlImportBtn.onclick = () => {
    resetUrlImportState();
    state.showUrlImport = true;
    state.showForm = false;
    state.showRandomizer = false;
    renderModal();
  };

  const searchInput = document.getElementById("search-input");
  if (searchInput) searchInput.oninput = (e) => { state.query = e.target.value; renderGrid(); };

  const exportBtn = document.querySelector('[data-action="export-data"]');
  if (exportBtn) exportBtn.onclick = exportData;
  const importTrigger = document.querySelector('[data-action="trigger-import"]');
  const importInput = document.getElementById("import-file-input");
  if (importTrigger && importInput) {
    importTrigger.onclick = () => importInput.click();
    importInput.onchange = handleImportFile;
  }
  const copyHtmlBtn = document.querySelector('[data-action="copy-html"]');
  if (copyHtmlBtn) copyHtmlBtn.onclick = copyPageHtml;
  const randomizerBtn = document.querySelector('[data-action="open-randomizer"]');
  if (randomizerBtn) randomizerBtn.onclick = () => {
    state.viewItemKey = null;
    state.showForm = false;
    state.showRandomizer = true;

  };
  const langSelect = document.getElementById("lang-select");
  if (langSelect) langSelect.onchange = (e) => {
    state.language = e.target.value;
    renderGrid();
    if (state.viewItemKey) renderModal();
  };

  attachGridEvents();
}

function attachFormEvents() {
  const form = document.getElementById("entry-form");
  if (!form) return;
  FIELDS[state.activeTab].forEach(f => {
    if (f.type !== "file") return;
    const input = document.getElementById(`file-${f.key}`);
    if (!input) return;
    input.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.pendingImage[f.key] = reader.result;
        const preview = document.getElementById(`preview-${f.key}`);
        if (preview) { preview.src = reader.result; preview.style.display = "block"; }
      };
      reader.readAsDataURL(file);
    };
  });
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const name = (fd.get("name") || "").toString().trim();
    const errorEl = document.getElementById("form-error");
    if (!name) { errorEl.innerHTML = `<div class="form-error">Introdu un nume înainte de a adăuga intrarea.</div>`; return; }
    const newItem = { id: uid(), custom: true, name };
    FIELDS[state.activeTab].forEach(f => {
      if (f.type === "file") newItem[f.key] = state.pendingImage[f.key] || null;
      else newItem[f.key] = (fd.get(f.key) || "").toString();
    });
    state.data[state.activeTab].push(newItem);
    saveData();
    state.showForm = false;
    state.pendingImage = {};
    render();
  };
}

/* ================= BACKUP MANUAL (opțional) ================= */
function exportData() {
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "compendiul-dnd-backup.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function handleImportFile(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const valid = TABS.every(t => Array.isArray(parsed[t.key]));
      if (!valid) throw new Error("format necunoscut");
      if (!confirm("Importul va înlocui datele curente din aplicație cu cele din fișier. Continui?")) return;
      state.data = parsed;
      saveData();
      render();
      alert("Backup importat cu succes.");
    } catch (err) {
      alert("Fișierul nu pare a fi un backup valid al acestei aplicații.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

function copyPageHtml() {
  const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  const btn = document.querySelector('[data-action="copy-html"]');
  const showDone = () => {
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = "✓ Copiat!";
    setTimeout(() => { btn.textContent = original; }, 1800);
  };
  const showFail = () => alert("Nu s-a putut copia automat. Selectează și copiază manual codul.");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(html).then(showDone).catch(() => fallbackCopy(html, showDone, showFail));
  } else {
    fallbackCopy(html, showDone, showFail);
  }
}
function fallbackCopy(text, onSuccess, onFail) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand("copy");
    if (onSuccess) onSuccess();
  } catch (e) {
    if (onFail) onFail();
  }
  document.body.removeChild(ta);
}

/* ================= PORNIRE ================= */
pornesteSincronizare();
